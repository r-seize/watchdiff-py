name: Release to TestPyPI

on:
  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

  # Pre-release tags: v0.1.1-rc1, v0.1.1-beta1, v0.1.1-alpha1
  push:
    tags:
      - "v*.*.*-rc*"
      - "v*.*.*-alpha*"
      - "v*.*.*-beta*"

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Step 1: validate before releasing
  # -----------------------------------------------------------------------
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -v --tb=short

  # -----------------------------------------------------------------------
  # Step 2: build the distribution
  # -----------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Verify package with twine
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # -----------------------------------------------------------------------
  # Step 3: publish to TestPyPI via OIDC Trusted Publisher
  # -----------------------------------------------------------------------
  publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: testpypi
      url: https://test.pypi.org/project/watchdiff-core/

    permissions:
      id-token: write  # Required for OIDC authentication

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.test.pypi.org/legacy/
